version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    labels:
      - "dependencies"
      - "backend"
    open-pull-requests-limit: 5
    groups:
      backend-npm:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    labels:
      - "dependencies"
      - "web"
    open-pull-requests-limit: 5
    groups:
      web-npm:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    labels:
      - "dependencies"
      - "android"
    open-pull-requests-limit: 5
    groups:
      android-gradle:
        patterns:
          - "*"

  # Intentionally omit Docker ecosystem updates for repo Dockerfiles.
  # All current Dockerfiles are multi-stage, and GitHub documents that
  # Dependabot only updates the first FROM directive for Dockerfiles and
  # does not support multi-stage Docker builds. Keeping docker updates
  # configured here creates false confidence that shipped runtime bases
  # are covered when later FROM stages stay stale.

  - package-ecosystem: "docker-compose"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Belgrade"
    labels:
      - "dependencies"
      - "infra"
      - "docker"
    open-pull-requests-limit: 2
    groups:
      infra-docker-compose:
        patterns:
          - "*"
